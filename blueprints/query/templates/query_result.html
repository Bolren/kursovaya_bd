<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат запроса</title>
    <link rel="stylesheet" href="{{url_for('static', filename='sem1.css')}}" type="text/css">
</head>
<body>
<div style="text-align: center;">
    <h2>Результат выполнения запроса</h2>

    <table border="1">
        <tr class="tab_title">
            {% for name in results%}
                <td>{{ name }}</td>
            {% endfor %}
        </tr>
        {% for values in data %}
            <tr>
                {% for value in values %}
                    <td>{{ value }}</td>
                {% endfor %}
            </tr>
        {% endfor %}
    </table>

    <a href="/query">К запросам</a><br>
    <a href="/">В главное меню</a>
</div>
</body>
</html>
