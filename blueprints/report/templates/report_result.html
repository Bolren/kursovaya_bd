<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчет</title>
    <link href="{{url_for('static', filename='sem1.css')}}" rel="stylesheet" type="text/css">
</head>
<body>
<div style="text-align: center;">
    {% if variant == "create" %}
        <h3>{{ message }}</h3><br><br>

    {% else %}
        <h2>Результат выполнения запроса</h2>

        <table border="1">
            <tr class="tab_title">
                {% for name in results %}
                    <td>{{ name }}</td>
                {% endfor %}
            </tr>
        {% for values in data %}
            <tr>
                {% for value in values %}
                    <td>{{ value }}</td>
                {% endfor %}
            </tr>
        {% endfor %}
        </table>
        <br>
    {% endif %}

    <a href="/report">К отчетам</a><br>
    <a href="/">В главное меню</a>
</div>
</body>
</html>
